name: TypeScript CI

on:
  pull_request:
    paths:
      - "src/**/*.ts"
      - "src/**/*.tsx"
      - "src/**/*.astro"
      - "astro.config.*"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "vitest.config.ts"
      - "biome.json"
      - "scripts/check_ts_rules.py"
      - ".github/workflows/typescript-ci.yml"
  push:
    paths:
      - "src/**/*.ts"
      - "src/**/*.tsx"
      - "src/**/*.astro"
      - "astro.config.*"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "vitest.config.ts"
      - "biome.json"
      - "scripts/check_ts_rules.py"
      - ".github/workflows/typescript-ci.yml"

jobs:
  ts-lint-biome:
    name: TS-Lint-biome
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Biome check
        run: npm run check

  ts-typecheck:
    name: TS-Lint-tsc
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript typecheck
        run: npm run typecheck

  check-ts-rules:
    name: Check-TS-Rules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run custom TypeScript rules
        run: python3 scripts/check_ts_rules.py

  ts-tests:
    name: TS-Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage
