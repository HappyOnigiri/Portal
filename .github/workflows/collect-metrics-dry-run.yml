name: Collect Metrics (Dry Run)

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "対象リポジトリ (例: owner/name)。空欄で自リポジトリ"
        required: false
        default: ""

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      pull-requests: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify GitHub token
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::GH_TOKEN is not set. Configure the 'GH_TOKEN' secret in repository settings."
            echo "Required permissions: pull-requests (read), actions (read)"
            exit 1
          fi
          echo "::group::gh auth status"
          gh auth status
          echo "::endgroup::"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Collect metrics (dry run)
        id: collect
        run: |
          if [ -n "$REPO_INPUT" ]; then
            RESULT=$(npm run collect-metrics -- --dry-run --repo "$REPO_INPUT")
          else
            RESULT=$(npm run collect-metrics -- --dry-run)
          fi
          echo "result<<EOF" >> "$GITHUB_OUTPUT"
          echo "$RESULT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO_INPUT: ${{ inputs.repo }}

      - name: Write summary
        run: |
          cat << 'SUMMARY_EOF' >> "$GITHUB_STEP_SUMMARY"
          ## Metrics (Dry Run)

          ```json
          SUMMARY_EOF
          echo '${{ steps.collect.outputs.result }}' >> "$GITHUB_STEP_SUMMARY"
          cat << 'SUMMARY_EOF' >> "$GITHUB_STEP_SUMMARY"
          ```
          SUMMARY_EOF
