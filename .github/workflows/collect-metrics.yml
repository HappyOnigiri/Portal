name: Collect Metrics

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "対象リポジトリ (例: owner/name)。空欄で自リポジトリ"
        required: false
        default: ""

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write
      pull-requests: read
      actions: read

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect metrics
        run: |
          if [ -n "$INPUT_REPO" ]; then
            npm run collect-metrics -- --repo "$INPUT_REPO"
          else
            npm run collect-metrics
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          INPUT_REPO: ${{ inputs.repo }}

      - name: Commit and push if changed
        run: |
          git config user.name "OnigiriBot[bot]"
          git config user.email "${{ secrets.APP_ID }}+OnigiriBot[bot]@users.noreply.github.com"
          if ! git diff --quiet -- src/data/author-status.json; then
            git add src/data/author-status.json
            git commit -m "chore: update repository metrics [skip ci]"
            git push origin main
          else
            echo "No changes to commit"
          fi
