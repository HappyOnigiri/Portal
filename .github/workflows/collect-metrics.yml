name: Collect Metrics

on:
  workflow_dispatch:
    inputs:
      no-cache:
        description: "キャッシュを無効にして全リポジトリを再集計する"
        type: boolean
        default: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write
      pull-requests: read
      actions: read

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify GitHub token
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::GH_TOKEN is not set. Configure the 'GH_TOKEN' secret in repository settings."
            echo "Required permissions: pull-requests (read), actions (read)"
            exit 1
          fi
          echo "::group::gh auth status"
          gh auth status
          echo "::endgroup::"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Collect metrics
        run: pnpm run collect-metrics${{ inputs.no-cache == true && ' -- --no-cache' || '' }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          PORTAL_CONFIG: ${{ secrets.PORTAL_CONFIG }}

      - name: Collect articles
        run: FETCH_ARTICLES=true pnpm exec astro sync

      - name: Format
        run: pnpm exec biome format --write .

      - name: Commit and push if changed
        run: |
          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "${{ secrets.APP_ID }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          git add src/data/author-status.json src/data/articles/zenn.json src/data/articles/note.json src/data/repositories/
          if ! git diff --cached --quiet; then
            git commit -m "chore: update repository metrics [skip ci]"
            git push origin main
          else
            echo "No changes to commit"
          fi
