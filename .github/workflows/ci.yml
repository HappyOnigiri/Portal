name: CI

on:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run CI checks
        run: make ci

      - name: Verify no diff after make ci
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Error: Working tree has changes after make ci."
            echo ""
            echo "Changed files:"
            git status --short
            echo ""
            echo "Diff:"
            git diff
            echo ""
            echo "Fix: Run 'make ci' locally and commit the generated files."
            exit 1
          fi
