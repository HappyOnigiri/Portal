name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.3.0)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Validate version format
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must be in semver format (e.g. 1.3.0)"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Check tag does not already exist
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "::error::Tag v${VERSION} already exists"
            exit 1
          fi

      - name: Create release branch
        env:
          VERSION: ${{ inputs.version }}
        run: git checkout -b "release/v${VERSION}"

      - name: Update package.json version
        env:
          VERSION: ${{ inputs.version }}
        run: npm version "$VERSION" --no-git-tag-version

      - name: Commit version bump
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "release: v${VERSION}"
          git push origin "release/v${VERSION}"

      - name: Build changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          toTag: release/v${{ inputs.version }}
          configurationJson: |
            {
              "categories": [
                { "title": "## Features", "labels": ["feature"] },
                { "title": "## Bug Fixes", "labels": ["fix"] },
                { "title": "## Refactoring", "labels": ["refactor"] },
                { "title": "## Maintenance", "labels": ["chore", "ci", "docs"] }
              ],
              "sort": { "order": "ASC", "on_property": "mergedAt" },
              "template": "#{{CHANGELOG}}\n#{{UNCATEGORIZED}}",
              "pr_template": "- #{{TITLE}} (#{{NUMBER}})",
              "empty_template": "No notable changes.",
              "label_extractor": [
                { "pattern": "^feat", "target": "feature", "on_property": "title", "method": "match" },
                { "pattern": "^fix", "target": "fix", "on_property": "title", "method": "match" },
                { "pattern": "^refactor", "target": "refactor", "on_property": "title", "method": "match" },
                { "pattern": "^chore", "target": "chore", "on_property": "title", "method": "match" },
                { "pattern": "^ci", "target": "ci", "on_property": "title", "method": "match" },
                { "pattern": "^docs", "target": "docs", "on_property": "title", "method": "match" }
              ],
              "tag_resolver": {
                "method": "semver",
                "filter": { "pattern": "v(.+)$", "flags": "g" }
              }
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure release label exists
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh label create release --color "0075ca" --force

      - name: Create release PR
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          VERSION: ${{ inputs.version }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
        run: |
          gh pr create \
            --base main \
            --head "release/v${VERSION}" \
            --title "release: v${VERSION}" \
            --body "${CHANGELOG}" \
            --label "release"
